<script>
    (function(){
        'use strict';

        // ---------- Dữ liệu 30 câu hỏi + giải thích ----------
        const questions = [
            { q: "Mô hình OSI được phát triển bởi tổ chức nào?", options: ["IEEE", "IETF", "ISO", "W3C"], answer: 2, explanation: "OSI do ISO (Tổ chức Tiêu chuẩn hóa Quốc tế) phát triển." },
            { q: "Mô hình OSI có bao nhiêu tầng?", options: ["4", "5", "6", "7"], answer: 3, explanation: "Mô hình OSI có đúng 7 tầng." },
            { q: "Tầng nào trong mô hình OSI chịu trách nhiệm định tuyến (routing) và xác định đường đi tối ưu dựa trên địa chỉ IP?", options: ["Tầng Vật lý", "Tầng Liên kết dữ liệu", "Tầng Mạng", "Tầng Giao vận"], answer: 2, explanation: "Tầng Mạng (Layer 3) xử lý địa chỉ IP và định tuyến." },
            { q: "Giao thức TCP và UDP hoạt động chủ yếu tại tầng nào của mô hình OSI?", options: ["Tầng Ứng dụng", "Tầng Phiên", "Tầng Giao vận", "Tầng Mạng"], answer: 2, explanation: "Tầng Giao vận (Layer 4) là nơi TCP và UDP hoạt động." },
            { q: "Thiết bị mạng nào hoạt động chủ yếu tại Tầng 2 - Liên kết dữ liệu và sử dụng địa chỉ MAC để chuyển tiếp khung tin?", options: ["Router", "Switch", "Hub", "Modem"], answer: 1, explanation: "Switch hoạt động tại Layer 2 dựa trên bảng địa chỉ MAC." },
            { q: "Tầng nào của OSI chịu trách nhiệm mã hóa, nén dữ liệu và chuyển đổi định dạng (ví dụ: chuyển từ mã ASCII sang EBCDIC)?", options: ["Tầng Ứng dụng", "Tầng Trình diễn", "Tầng Phiên", "Tầng Giao vận"], answer: 1, explanation: "Tầng Trình diễn (Layer 6) lo việc dịch định dạng, mã hóa và nén." },
            { q: "Trong quá trình gửi dữ liệu, khi dữ liệu đi từ tầng trên xuống tầng dưới, mỗi tầng sẽ thêm thông ", options: ["Giải mã hóa (Decryption)", "Phân mảnh (Fragmentation)", "Đóng gói (Encapsulation)", "Định tuyến (Routing)"], answer: 2, explanation: "Quá trình thêm header khi đi xuống gọi là Đóng gói (Encapsulation)." },
            { q: "Tầng 1 (Vật lý) của mô hình OSI định nghĩa điều gì?", options: ["Địa chỉ IP nguồn và đích", "Các chuẩn về đầu nối, cáp, điện áp và tốc độ truyền bit thô", "Cách thiết lập và kết thúc phiên làm việc", "Cơ chế kiểm soát lỗi và luồng dữ liệu"], answer: 1, explanation: "Tầng Vật lý liên quan đến tín hiệu điện, cáp, đầu nối, bit thô." },
            { q: "Giao thức HTTP và DNS hoạt động ở tầng cao nhất của mô hình OSI. Đó là tầng nào?", options: ["Tầng 4", "Tầng 5", "Tầng 6", "Tầng 7"], answer: 3, explanation: "HTTP, DNS thuộc Tầng Ứng dụng (Layer 7)." },
            { q: "Điểm khác biệt cơ bản giữa mô hình OSI và mô hình TCP/IP là gì?", options: ["OSI ít tầng hơn", "OSI là mô hình lý thuyết, độc lập với giao thức; TCP/IP là mô hình thực tế dựa trên các giao thức cụ thể", "TCP/IP không có tầng Ứng dụng", "OSI được sử dụng cho mạng LAN, TCP/IP chỉ dùng cho mạng WAN"], answer: 1, explanation: "OSI mang tính lý thuyết, độc lập giao thức; TCP/IP là mô hình thực tế dựa trên giao thức cụ thể." },
            // 11-20 nâng cao
            { q: "Tại sao một cuộc tấn công SYN Flood (DDoS) thường được phân loại là tấn công vào Tầng 4 (Transport) thay vì Tầng 3 (Network) mặc dù nó liên quan đến địa chỉ IP?", options: ["Vì gói tin SYN không chứa địa chỉ IP nguồn.", "Vì nó khai thác cơ chế bắt tay ba bước (three-way handshake) và trạng thái kết nối của TCP.", "Vì tường lửa chỉ có thể chặn tấn công SYN ở Tầng 3.", "Vì Tầng 3 không có khả năng xử lý giao thức TCP."], answer: 1, explanation: "Địa chỉ IP có thể bị giả mạo (spoof), nhưng bản chất của SYN Flood là gửi hàng loạt gói SYN khiến server phải giữ trạng thái nửa mở (half-open) trong bảng kết nối TCP (Tầng 4). Tầng 3 chỉ lo chuyển gói tin đến đích, không quản lý trạng thái logic của phiên kết nối." },
            { q: "Một gói tin dữ liệu khi đi từ máy tính A đến máy tính B qua Internet. Tại Router biên (Gateway), gói tin sẽ bị giải đóng gói (Decapsulation) đến tầng nào trước khi được đóng gói lại để gửi đi mạng tiếp theo?", options: ["Tầng 1 (Physical)", "Tầng 2 (Data Link)", "Tầng 3 (Network)", "Tầng 4 (Transport)"], answer: 2, explanation: "Router hoạt động ở Tầng 3 (Network). Khi nhận khung từ Tầng 2, nó gỡ bỏ header L2 (MAC) để đọc header L3 (IP). Sau khi quyết định tuyến đường ra, nó đóng gói gói tin IP vào một khung L2 mới (với MAC nguồn/đích mới) phù hợp với giao tiếp ở mạng tiếp theo." },
            { q: "Trong mô hình OSI, tầng nào chịu trách nhiệm đảm bảo rằng một file 10MB được gửi đi không bị lỗi từng byte, ngay cả khi mạng bên dưới (Tầng 2) đã có cơ chế CRC để kiểm tra lỗi khung?", options: ["Tầng Phiên (Session)", "Tầng Trình diễn (Presentation)", "Tầng Giao vận (Transport)", "Tầng Ứng dụng (Application))"], answer: 2, explanation: "CRC của Tầng 2 chỉ kiểm tra lỗi trên từng khung (per-hop). Tầng Giao vận (TCP) cung cấp kiểm soát lỗi đầu cuối - đầu cuối (end-to-end) thông qua checksum và cơ chế báo nhận (ACK) để đảm bảo toàn bộ file 10MB được ghép lại chính xác." },
            { q: "VLAN trên Switch tác động chủ yếu đến tầng nào?", options: ["Tầng 1 (Physical)", "Tầng 2 (Data Link)", "Tầng 3 (Network)", "Tầng 4 (Transport)"], answer: 1, explanation: "VLAN đánh dấu (tagging - 802.1Q) là một chức năng mở rộng của Tầng 2. Nó phân chia một Switch vật lý thành nhiều Switch logic (miền quảng bá) riêng biệt dựa trên MAC, trước khi Tầng 3 (Subnet) can thiệp." },
            { q: "Giao thức ARP (Address Resolution Protocol) hoạt động ở đâu trong tham chiếu chéo giữa OSI và TCP/IP?", options: ["Thuần Tầng 2", "Thuần Tầng 3", "Cầu nối Tầng 2 và 3 (Layer 2.5)", "Tầng 4"], answer: 2, explanation: "ARP dùng để tìm địa chỉ MAC (Tầng 2) khi biết địa chỉ IP (Tầng 3). Nó không thuộc hẳn Tầng 3 vì không dùng IP để định tuyến, cũng không thuần Tầng 2 vì nó phân giải địa chỉ IP. Nó thường được ví là Layer 2.5." },
            { q: "Khi bạn truy cập một trang web sử dụng HTTPS, chức năng mã hóa SSL/TLS thuộc về tầng nào của mô hình OSI? Tuy nhiên, một số tài liệu bảo mật hiện đại lại xếp nó vào một \"Tầng\" khác. Đó là sự khác biệt nào?", options: ["Tầng 5 - Phiên (Session), nhưng thực tế nó hoạt động giữa Tầng 4 và Tầng 7.", "TẦNG 6 - Trình diễn (Presentation), nhưng trong mô hình TCP/IP nó nằm ở TẦNG ỨNG DỤNG.", "TẦNG 7 - ỨNG DỤNG (Application), vì nó chỉ mã hóa dữ liệu người dùng.", "TẦNG 4 - GIAO VẬN (Transport), vì nó thay thế cho TCP."], answer: 1, explanation: "Trong mô hình OSI lý thuyết, mã hóa rõ ràng là chức năng của TẦNG 6 (Trình diễn). Tuy nhiên, trong thực tế Internet (mô hình TCP/IP), TLS hoạt động bên trên TCP (TẦNG 4) và bên dưới HTTP (TẦNG 7) nên đôi khi được gọi là \"TẦNG 5\" trong cách nói thực dụng, gây ra tranh luận về vị trí chính xác." },
            { q: "Một máy tính gửi một bản tin broadcast đến địa chỉ 255.255.255.255. Tại Tầng 2 (Data Link), địa chỉ MAC đích của khung này sẽ là gì và hành vi của Switch đối với khung này như thế nào?", options: ["00:00:00:00:00:00 - chặn", "FF:FF:FF:FF:FF:FF - chuyển tiếp tất cả cổng", "MAC Default Gateway - gửi nó qua Router", "MAC máy gửi - Switch sẽ lọc nó"], answer: 1, explanation: "Broadcast L3 được đóng vào khung L2 với MAC đích FF:FF:FF:FF:FF:FF, Switch flood ra tất cả cổng." },
            { q: "Tại sao việc sử dụng mô hình OSI để Troubleshooting mạng lại hiệu quả hơn khi áp dụng nguyên tắc Bottom-Up (từ Tầng 1 lên) so với Top-Down?", options: ["Vì hầu hết các sự cố mạng đều do lỗi cấu hình phần mềm ở Tầng 7.", "Vì nếu cáp mạng bị đứt (Tầng 1), việc kiểm tra cấu hình IP (Tầng 3) là vô nghĩa và tốn thời gian.", "Vì các giao thức tầng thấp phức tạp hơn tầng cao.", "Vì đây là quy định bắt buộc của tiêu chuẩn ISO."], answer: 1, explanation: "Phương pháp Bottom-Up (Kiểm tra cáp -> Link -> Ping IP -> Kiểm tra Port/DNS) là hiệu quả nhất trong thực tế vì nó loại trừ các lỗi vật lý và logic cơ bản trước. Không ai đi sửa cấu hình Firewall (Tầng 7) khi dây mạng chưa cắm." },
            { q: "Điều gì xảy ra với dữ liệu tại Tầng Trình diễn (Presentation - Layer 6) nếu hai máy tính giao tiếp với nhau cùng sử dụng mã hóa UTF-8 và không yêu cầu nén dữ liệu?", options: ["Tầng 6 bị bỏ qua hoàn toàn, dữ liệu từ Tầng 7 đi thẳng xuống Tầng 5.", "Tầng 6 vẫn hoạt động nhưng chỉ thực hiện chức năng \"dịch định dạng\" mặc định và truyền dữ liệu xuống.", "Dữ liệu sẽ bị lỗi vì Tầng 6 không tìm thấy thuật toán mã hóa để áp dụng.", "Tầng 6 sẽ thêm một header rỗng để đánh dấu không có mã hóa."], answer: 1, explanation: "Tầng Presentation ( Tầng Trình diễn) vẫn luôn có mặt trong kiến trúc OSI về mặt khái niệm. Nếu không cần chuyển đổi mã hóa/nén đặc biệt, nó chỉ đơn giản là chuyển tiếp (pass-through) dữ liệu từ Tầng 7 xuống Tầng 5 mà không can thiệp." },
            { q: "Khi phân tích gói tin bằng Wireshark, bạn thấy một gói tin có thông tin Ethernet II, bên trong là IPv4, bên trong là TCP, và cuối cùng là HTTP. Dựa vào mô hình OSI, phần Ethernet II và IPv4 tương ứng với hoạt động đóng gói ở đâu?", options: ["Ethernet II (L3), IPv4 (L2)", "Ethernet II (L2), IPv4 (L3)", "Cả hai đều thuộc Tầng 2", "Cả hai đều thuộc Tầng 3"], answer: 1, explanation: "Đây là nguyên tắc đóng gói cơ bản. Ethernet II là giao thức Tầng Liên kết dữ liệu (Tầng 2) chứa địa chỉ MAC. IPv4 là giao thức Tầng Mạng (Tầng 3) chứa địa chỉ IP và được đặt trong phần Payload của khung Ethernet." },
            // 21-30 tấn công mạng
            { q: "Kẻ tấn công gửi liên tục các gói tin ARP Reply giả mạo vào mạng LAN để liên kết địa chỉ MAC của máy tấn công với địa chỉ IP của Gateway. Kỹ thuật ARP Spoofing/Poisoning này khai thác điểm yếu ở tầng nào của mô hình OSI?", options: ["Tầng 1 (Physical)", "Tầng 2 (Data Link)", "Tầng 3 (Network)", "Tầng 4 (Transport)"], answer: 1, explanation: "ARP (Address Resolution Protocol) hoạt động ở Tầng 2 (Data Link) vì nó phân giải địa chỉ MAC. Mặc dù nó cần biết IP (Tầng 3), gói tin ARP được đóng gói trực tiếp trong khung Ethernet mà không cần IP Header." },
            { q: "Một cuộc tấn công từ chối dịch vụ (DoS) nhằm vào Switch, trong đó kẻ tấn công gửi hàng loạt khung tin với địa chỉ MAC nguồn ngẫu nhiên khác nhau nhằm làm đầy bảng CAM Table. Kỹ thuật này có tên là gì và nó tác động đến tầng OSI nào?", options: ["MAC Flooding - Tầng 2", "Ping of Death - Tầng 3", "SYN Flood - Tầng 4", "DNS Amplification - Tầng 7"], answer: 0, explanation: "MAC Flooding nhằm làm tràn bảng CAM Table của Switch (thiết bị Tầng 2). Khi bảng đầy, Switch chuyển sang chế độ \"fail-open\", hoạt động như một Hub và phát tán mọi khung tin ra tất cả các cổng, giúp kẻ tấn công nghe lén dễ dàng." },
            { q: "Kỹ thuật tấn công Ping of Death (gửi gói ICMP có kích thước lớn hơn 65.535 byte) chủ yếu khai thác lỗ hổng ở tầng OSI nào và giao thức nào\?", options: ["Tầng 2 - ARP", "Tầng 3 - IP/ICMP", "Tầng 4 - UDP", "Tầng 7 - HTTP"], answer: 1, explanation: "Ping of Death gửi gói ICMP vượt quá giới hạn kích thước tối đa của gói IP (65.535 byte). Quá trình phân mảnh và ghép lại gói tin xảy ra ở Tầng Mạng (Layer 3). Đây là lỗ hổng cũ của các hệ điều hành xử lý gói ICMP." },
            { q: "Kẻ tấn công sử dụng công cụ để gửi hàng loạt gói TCP SYN đến một máy chủ web nhưng không bao giờ hoàn tất bước bắt tay cuối cùng. Đây là ví dụ điển hình của kiểu tấn công SYN Flood. Cuộc tấn công này nhằm vào cơ chế quản lý trạng thái kết nối ở tầng nào?", options: ["Tầng 3(Network) - Khai thác địa chỉ IP", "Tầng 4 (Transport) - Khai thác quy trình bắt tay TCP", "Tầng 5 (Session) - Khai thác phiên đăng nhập", "Tầng 6 (Presentation) - Khai thác mã hóa SSL"], answer: 1, explanation: "SYN Flood khai thác cơ chế Three-way Handshake của TCP. Server phải cấp phát tài nguyên bộ nhớ cho mỗi kết nối nửa mở (Half-open). Việc quản lý kết nối và trạng thái này là chức năng cốt lõi của Tầng Giao vận (Layer 4)." },
            { q: "Kẻ tấn công đứng giữa kết nối HTTPS và hạ cấp kết nối từ HTTPS (TLS) xuống HTTP không mã hóa để đọc trộm dữ liệu. Kỹ thuật SSL Stripping này can thiệp trực tiếp vào hoạt động logic giữa các tầng nào của mô hình OSI?", options: ["Giữa L2 và L3", "Giữa L4 (TCP) và L7 (HTTP)", "Giữa L1 và L2", "Giữa L3 và L4"], answer: 1, explanation: "SSL Stripping không phá vỡ thuật toán mã hóa mà can thiệp vào quá trình chuyển hướng. Kẻ tấn công (Man-in-the-Middle) giữ kết nối HTTPS với server nhưng cung cấp kết nối HTTP với client. Vị trí logic của nó nằm ở giữa Tầng Giao vận (TCP) và Tầng Ứng dụng (HTTP)." },
            { q: "DNS Cache Poisoning (Đầu độc bộ nhớ đệm DNS) là kỹ thuật tấn công nhằm chuyển hướng người dùng từ một tên miền hợp lệ (ví dụ: nganhang.com) sang một địa chỉ IP độc hại. Trong mô hình OSI, dịch vụ phân giải tên miền DNS và cuộc tấn công này hoạt động ở tầng nào?", options: ["Tầng 3(Network)", "Tầng 4 (Transport)", "Tầng 7 (Application)", "Tầng 2 (Data Link)"], answer: 2, explanation: "DNS là một dịch vụ/giao thức thuộc Tầng Ứng dụng (Layer 7). Mặc dù nó sử dụng UDP/TCP (Tầng 4) để truyền tải, bản chất của việc phân giải tên miền và lỗ hổng Cache Poisoning nằm ở logic phần mềm ứng dụng DNS." },
            { q: "Một kẻ tấn công cố tình cắt đứt hoặc gây nhiễu điện từ mạnh lên đường truyền cáp quang hoặc cáp đồng, khiến tín hiệu Bit không thể truyền đi được. Cuộc tấn công vật lý này tương ứng với tầng nào của mô hình OSI?", options: ["Tầng 1 (Physical)", "Tầng 2 (Data Link)", "Tầng 3 (Network)", "Tầng 4 (Transport)"], answer: 0, explanation: "Bất kỳ hành vi can thiệp vật lý nào (cắt cáp, gây nhiễu sóng vô tuyến, phá hủy phần cứng) đều được phân loại là tấn công vào Tầng Vật lý (Layer 1). Mục tiêu là ngăn chặn việc truyền tín hiệu Bit." },
            { q: "Kỹ thuật SQL Injection (Tiêm nhiễm SQL) cho phép kẻ tấn công chèn mã truy vấn độc hại vào trường nhập liệu của website để thao túng cơ sở dữ liệu. Theo mô hình OSI, lỗ hổng này nằm ở tầng nào và kẻ tấn công tương tác với tầng nào?", options: ["Tầng 2 (Data Link)", "Tầng 4 (Transport)", "Tầng 6 (Presentation)", "Tầng 7 (Application)"], answer: 3, explanation: "SQL Injection xảy ra khi ứng dụng web không kiểm tra đầu vào an toàn trước khi gửi đến Database. Đây là lỗi trong mã nguồn và logic xử lý của ứng dụng, do đó thuộc Tầng Ứng dụng (Layer 7)." },
            { q: "Smurf Attack là một dạng tấn công khuếch đại (Amplification) lợi dụng địa chỉ Broadcast của mạng và giao thức ICMP Echo Request. Cuộc tấn công này sử dụng địa chỉ IP giả mạo và khai thác hành vi của Router/Switch tại tầng OSI nào?", options: ["Tầng 2 (Data Link)", "Tầng 3 (Network) - IP Broadcast và ICMP", "Tầng 4 (Transport)", "Tầng 7 (Application)"], answer: 1, explanation: "Smurf Attack sử dụng địa chỉ IP Broadcast (ví dụ: 192.168.1.255). Kẻ tấn công gửi ICMP Echo Request với IP nguồn giả mạo là IP của nạn nhân. Tất cả thiết bị trong mạng sẽ Reply lại nạn nhân. Hoạt động định tuyến IP và ICMP diễn ra ở Tầng 3." },
            { q: "Khi phân tích lưu lượng bằng Wireshark, bạn phát hiện có nhiều gói tin với ACK Number không hợp lệ hoặc SEQ Number dự đoán được, cho thấy dấu hiệu của TCP Session Hijacking (Chiếm quyền điều khiển phiên TCP). Mục tiêu của kẻ tấn công trong trường hợp này là chen vào phiên làm việc đã được xác thực. Hành vi này can thiệp vào sự phối hợp giữa tầng Giao vận và tầng nào?", options: ["Tầng 2 (Data Link)", "Tầng 3 (Network)", "Tầng 5 (Session)", "Tầng 6 (Presentation)"], answer: 2, explanation: "Mặc dù TCP nằm ở Tầng 4, việc \"Chiếm quyền phiên\" là can thiệp vào trạng thái duy trì cuộc hội thoại. Trong mô hình OSI, Tầng Phiên (Layer 5) chịu trách nhiệm quản lý các phiên giao tiếp (bắt đầu, duy trì checkpoints, kết thúc). Đây là một câu hỏi khó vì trong TCP/IP, chức năng này bị dồn vào Tầng Ứng dụng hoặc Giao vận." }
        ];

        // ---------- Biến toàn cục ----------
        const form = document.getElementById('quizForm');
        const container = document.getElementById('questionsContainer');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');
        const scoreSpan = document.getElementById('scoreValue');
        const answeredCountSpan = document.getElementById('answeredCount');
        const timerText = document.getElementById('timerText');
        const resultMsg = document.getElementById('resultMessage');

        let userAnswers = new Array(30).fill(null);
        let quizSubmitted = false;
        let score = 0;

        // Timer
        const TOTAL_SECONDS = 15 * 60; // 15 phút
        let remainingSeconds = TOTAL_SECONDS;
        let timerInterval = null;
        let timerExpired = false;

        // ---------- Timer functions ----------
        function formatTime(secs) {
            const mins = Math.floor(secs / 60);
            const seconds = secs % 60;
            return `${mins.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            timerText.textContent = formatTime(remainingSeconds);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function startTimer() {
            if (timerInterval) stopTimer();
            if (quizSubmitted || timerExpired) return;
            
            timerInterval = setInterval(() => {
                if (quizSubmitted || timerExpired) {
                    stopTimer();
                    return;
                }
                remainingSeconds--;
                updateTimerDisplay();

                if (remainingSeconds <= 0) {
                    remainingSeconds = 0;
                    updateTimerDisplay();
                    timerExpired = true;
                    stopTimer();
                    // Tự động nộp bài khi hết giờ
                    if (!quizSubmitted) {
                        autoSubmit();
                    }
                }
            }, 1000);
        }

        function autoSubmit() {
            if (quizSubmitted) return;
            quizSubmitted = true;
            stopTimer();
            
            // Vô hiệu hóa radio
            document.querySelectorAll('input[type="radio"]').forEach(radio => radio.disabled = true);
            
            updateScoreDisplay();
            renderQuestions(); // hiển thị đáp án + giải thích
            
            const percentage = (score/30*100).toFixed(1);
            resultMsg.innerHTML = `<i class="fas fa-hourglass-end"></i> Hết giờ! Kết quả: ${score}/30 (${percentage}%).`;
        }

        function resetTimer() {
            stopTimer();
            remainingSeconds = TOTAL_SECONDS;
            timerExpired = false;
            updateTimerDisplay();
            if (!quizSubmitted) {
                startTimer();
            }
        }

        // ---------- Render câu hỏi ----------
        function renderQuestions() {
            let html = '';
            questions.forEach((q, idx) => {
                const qNumber = idx + 1;
                const optionsHtml = q.options.map((opt, optIdx) => {
                    const letter = String.fromCharCode(65 + optIdx);
                    const checked = (userAnswers[idx] === optIdx) ? 'checked' : '';
                    return `
                        <label class="option-item">
                            <input type="radio" name="q${idx}" value="${optIdx}" ${checked} data-qindex="${idx}" data-optindex="${optIdx}">
                            <span class="option-text"><strong>${letter}.</strong> ${opt}</span>
                        </label>
                    `;
                }).join('');

                let feedbackHtml = '';
                if (quizSubmitted) {
                    const correctIdx = q.answer;
                    const correctLetter = String.fromCharCode(65 + correctIdx);
                    const userAns = userAnswers[idx];
                    const isCorrect = (userAns === correctIdx);
                    const userLetter = (userAns !== null) ? String.fromCharCode(65 + userAns) : 'Chưa chọn';
                    
                    let statusClass = (userAns === null) ? 'wrong-indicator' : (isCorrect ? 'correct-ans' : 'wrong-indicator');
                    const statusIcon = (userAns === null) ? 'fa-minus-circle' : (isCorrect ? 'fa-check-circle' : 'fa-times-circle');
                    
                    feedbackHtml = `
                        <div class="answer-feedback">
                            <div class="feedback-row">
                                <span class="${statusClass}"><i class="fas ${statusIcon} status-icon"></i> Bạn chọn: ${userLetter}</span>
                                <span class="correct-ans"><i class="fas fa-check"></i> Đáp án đúng: ${correctLetter}. ${q.options[correctIdx]}</span>
                            </div>
                            <div class="explanation-box">
                                <i class="fas fa-info-circle"></i> <strong>Giải thích:</strong> ${q.explanation}
                            </div>
                        </div>
                    `;
                }

                html += `
                    <div class="question-card" id="qCard${idx}">
                        <div class="q-title">
                            <span class="q-num">Câu ${qNumber}</span>
                            <span>${q.q}</span>
                        </div>
                        <div class="options">
                            ${optionsHtml}
                        </div>
                        ${feedbackHtml}
                    </div>
                `;
            });
            container.innerHTML = html;

            if (!quizSubmitted) {
                attachRadioListeners();
            } else {
                document.querySelectorAll('input[type="radio"]').forEach(radio => radio.disabled = true);
            }
            updateAnsweredCount();
        }

        function attachRadioListeners() {
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', function(e) {
                    if (quizSubmitted) return;
                    const qIndex = parseInt(this.dataset.qindex);
                    const optIndex = parseInt(this.value);
                    userAnswers[qIndex] = optIndex;
                    updateAnsweredCount();
                });
            });
        }

        function updateAnsweredCount() {
            const answered = userAnswers.filter(a => a !== null).length;
            answeredCountSpan.textContent = answered;
        }

        function calculateScore() {
            let correct = 0;
            userAnswers.forEach((ans, idx) => {
                if (ans === questions[idx].answer) correct++;
            });
            return correct;
        }

        function updateScoreDisplay() {
            score = calculateScore();
            scoreSpan.textContent = score;
        }

        // ---------- Xử lý nộp bài ----------
        function handleSubmit() {
            if (quizSubmitted) {
                updateScoreDisplay();
                resultMsg.innerHTML = `<i class="fas fa-medal"></i> Bạn đã hoàn thành! Điểm: ${score}/30.`;
                return;
            }
            quizSubmitted = true;
            stopTimer();
            
            document.querySelectorAll('input[type="radio"]').forEach(radio => radio.disabled = true);
            updateScoreDisplay();
            renderQuestions();
            
            const percentage = (score/30*100).toFixed(1);
            resultMsg.innerHTML = `<i class="fas fa-trophy" style="color:#d4a017;"></i> Kết quả: ${score}/30 (${percentage}%). `;
            if (score >= 25) resultMsg.innerHTML += 'Xuất sắc! 🌟';
            else if (score >= 20) resultMsg.innerHTML += 'Khá tốt! 👍';
            else resultMsg.innerHTML += 'Hãy ôn lại kiến thức OSI nhé! 📚';
        }

        function handleReset() {
            quizSubmitted = false;
            userAnswers = new Array(30).fill(null);
            score = 0;
            scoreSpan.textContent = '0';
            resultMsg.innerHTML = '';
            
            resetTimer();
            renderQuestions();
            updateScoreDisplay();
        }

        // ---------- Khởi tạo ----------
        function init() {
            renderQuestions();
            startTimer();
            
            submitBtn.addEventListener('click', handleSubmit);
            resetBtn.addEventListener('click', handleReset);
            updateScoreDisplay();
        }

        init();
    })();
</script>
</body>
</html>
